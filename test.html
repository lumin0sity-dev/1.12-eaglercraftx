<!DOCTYPE html>
<html>
<head>
    <title>Texture Loader Test</title>
    <script src="texture-loader.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .test { margin: 10px 0; padding: 10px; background: white; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        img { image-rendering: pixelated; border: 1px solid #ccc; margin: 5px; }
    </style>
</head>
<body>
    <h1>Texture Loader Test</h1>
    <div id="results"></div>
    
    <script>
        setTimeout(() => {
            const results = document.getElementById('results');
            
            // Test 1: Check if initialized
            const stats = getTextureLoaderStats();
            results.innerHTML += `<div class="test ${stats.initialized ? 'success' : 'error'}">
                ✓ Initialized: ${stats.initialized}<br>
                ✓ Total Mappings: ${stats.totalMappings}<br>
                ✓ Loaded Textures: ${stats.loadedTextures}
            </div>`;
            
            // Test 2: Check specific items
            const testItems = [
                'minecraft:netherite_sword',
                'minecraft:copper_ingot',
                'minecraft:amethyst_shard',
                'minecraft:trident',
                'minecraft:crossbow_standby'
            ];
            
            testItems.forEach(item => {
                const hasTexture = hasModernItemTexture(item);
                const path = getModernItemTexturePath(item);
                results.innerHTML += `<div class="test ${hasTexture ? 'success' : 'error'}">
                    ${hasTexture ? '✓' : '✗'} ${item}<br>
                    Path: ${path || 'Not found'}
                </div>`;
            });
            
            // Test 3: Load and display some textures
            results.innerHTML += '<h2>Sample Textures:</h2><div id="textures"></div>';
            const texturesDiv = document.getElementById('textures');
            
            preloadModernItemTextures(testItems).then(() => {
                testItems.forEach(item => {
                    const texture = getModernItemTexture(item);
                    if (texture) {
                        texturesDiv.innerHTML += `<div style="display: inline-block; margin: 10px; text-align: center;">
                            <img src="${texture.src}" width="64" height="64" title="${item}">
                            <div style="font-size: 12px; max-width: 120px; word-wrap: break-word;">${item.replace('minecraft:', '')}</div>
                        </div>`;
                    }
                });
            });
        }, 500);
    </script>
</body>
</html>
